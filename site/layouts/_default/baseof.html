<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ site.Title }}</title>
    <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}" />
    <style>
      :root {
        color-scheme: light;
        --bg: #0c1020;
        --bg-wash: #151a2f;
        --card: rgba(15, 20, 36, 0.86);
        --surface: rgba(23, 28, 46, 0.92);
        --surface-strong: #0b0f1c;
        --text: #edf2ff;
        --muted: #9ca8c9;
        --accent: #8aa6ff;
        --accent-strong: #bfd0ff;
        --accent-soft: rgba(138, 166, 255, 0.14);
        --highlight: #7bd1ff;
        --border: rgba(147, 167, 224, 0.16);
        --shadow: 0 28px 70px rgba(0, 0, 0, 0.32);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        position: relative;
        font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
        line-height: 1.6;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(122, 151, 255, 0.18), transparent 24rem),
          radial-gradient(circle at 85% 15%, rgba(88, 198, 255, 0.10), transparent 18rem),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-wash) 100%);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(16, 32, 51, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(16, 32, 51, 0.03) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.28), transparent 72%);
      }
      main {
        max-width: 74rem;
        margin: 0 auto;
        padding: 0 1rem 4rem;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 32px;
        padding: 2rem;
        margin-top: 1.5rem;
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }
      .eyebrow {
        display: inline-block;
        margin-bottom: 0.9rem;
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent);
      }
      h1, h2, h3 {
        font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
        line-height: 1.02;
        letter-spacing: -0.04em;
        margin: 0;
      }
      h1 {
        max-width: 10ch;
        font-size: clamp(3rem, 7vw, 5.8rem);
        margin-bottom: 1rem;
      }
      h2 {
        font-size: clamp(2rem, 4vw, 3.2rem);
        margin-bottom: 0.9rem;
      }
      h3 {
        font-size: 1.35rem;
        margin-bottom: 0.55rem;
      }
      p {
        margin: 0 0 1rem;
        color: var(--muted);
        font-size: 1.02rem;
      }
      a { color: var(--accent); }
      section + section { margin-top: 4rem; }
      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(18rem, 0.85fr);
        gap: 2rem;
        align-items: start;
      }
      .hero-copy {
        font-size: clamp(1.18rem, 2vw, 1.45rem);
        max-width: 38rem;
        color: #c7d3f8;
      }
      .hero-support {
        max-width: 36rem;
        font-size: 1rem;
      }
      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.85rem;
        margin: 1.25rem 0 1.5rem;
      }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.45rem;
        padding: 0.9rem 1.15rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        text-decoration: none;
        color: var(--text);
        background: rgba(20, 26, 42, 0.88);
        font-weight: 600;
        transition: transform 150ms ease, border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
      }
      .button:hover {
        transform: translateY(-1px);
        border-color: rgba(138, 166, 255, 0.35);
        box-shadow: 0 14px 26px rgba(0, 0, 0, 0.16);
      }
      .button.primary {
        background: var(--accent);
        color: #11162a;
        border-color: var(--accent);
      }
      .button.secondary {
        background: rgba(20, 26, 42, 0.56);
      }
      .hero-points {
        display: flex;
        flex-wrap: wrap;
        gap: 0.7rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .hero-points li,
      .chip {
        border: 1px solid rgba(138, 166, 255, 0.18);
        border-radius: 999px;
        padding: 0.4rem 0.7rem;
        background: rgba(19, 28, 52, 0.84);
        color: var(--accent-strong);
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 0.78rem;
      }
      .hero-panel,
      .section-shell,
      .comparison-card,
      .step,
      .compact-cards > article,
      .use-case,
      .cta-panel {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 12px 28px rgba(17, 32, 51, 0.05);
      }
      .hero-panel {
        border-radius: 28px;
        padding: 1.35rem;
        background:
          linear-gradient(180deg, rgba(12, 16, 30, 0.98), rgba(12, 16, 30, 0.92)),
          linear-gradient(135deg, rgba(138, 166, 255, 0.16), transparent);
        color: rgba(255, 255, 255, 0.88);
      }
      .hero-shot {
        overflow: hidden;
      }
      .panel-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.1rem;
        padding-bottom: 0.85rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .panel-title {
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 0.78rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .panel-dots {
        display: inline-flex;
        gap: 0.4rem;
      }
      .panel-dots span {
        width: 0.62rem;
        height: 0.62rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
      }
      .panel-dots span:nth-child(1) { background: #fb7185; }
      .panel-dots span:nth-child(2) { background: #fbbf24; }
      .panel-dots span:nth-child(3) { background: #34d399; }
      .signal-row,
      .token-row {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.8rem 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .signal-row:last-child,
      .token-row:last-child {
        border-bottom: 0;
      }
      .signal-row span,
      .token-label,
      .metric-label,
      .card-kicker,
      .step-note {
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 0.76rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .signal-row strong,
      .token-row strong {
        color: white;
      }
      .token-stack {
        margin-top: 1.15rem;
        display: grid;
        gap: 0.7rem;
      }
      .token-row {
        align-items: start;
        padding: 0.8rem 0 0.95rem;
      }
      .token-row p {
        margin: 0.35rem 0 0;
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.94rem;
      }
      .screenshot-frame {
        margin: 0.4rem 0 1rem;
        padding: 0.7rem;
        border-radius: 22px;
        border: 1px solid rgba(138, 166, 255, 0.12);
        background: rgba(6, 10, 19, 0.9);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .screenshot-frame img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 16px;
        border: 1px solid rgba(138, 166, 255, 0.12);
      }
      .panel-caption {
        margin: 0;
        color: rgba(255, 255, 255, 0.72);
        font-size: 0.95rem;
      }
      .panel-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
        margin-top: 1rem;
      }
      .panel-meta span {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.35rem 0.55rem;
        border-radius: 999px;
        background: rgba(138, 166, 255, 0.09);
        border: 1px solid rgba(138, 166, 255, 0.12);
        color: var(--accent-strong);
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 0.72rem;
        letter-spacing: 0.04em;
      }
      .section-shell {
        border-radius: 30px;
        padding: 1.5rem;
        background: rgba(16, 21, 37, 0.72);
      }
      .section-intro {
        max-width: 42rem;
        margin-bottom: 1.5rem;
      }
      ul {
        color: var(--muted);
        margin: 0;
        padding-left: 1.1rem;
      }
      .clean-list {
        list-style: none;
        padding: 0;
        display: grid;
        gap: 0.8rem;
      }
      .clean-list li {
        padding-left: 1.1rem;
        position: relative;
      }
      .clean-list li::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0.65rem;
        width: 0.42rem;
        height: 0.42rem;
        border-radius: 999px;
        background: var(--highlight);
      }
      .grid { display: grid; gap: 1rem; }
      .two-up { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .three-up { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .comparison-grid {
        align-items: stretch;
      }
      .comparison-card {
        border-radius: 24px;
        padding: 1.4rem;
      }
      .comparison-card-muted {
        background: rgba(20, 26, 42, 0.86);
      }
      .comparison-card-accent {
        background:
          linear-gradient(180deg, rgba(25, 35, 60, 0.96), rgba(18, 24, 42, 0.96));
      }
      .card-kicker,
      .step-note {
        display: inline-block;
        margin-bottom: 0.8rem;
        color: var(--accent);
      }
      .steps {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .step {
        border-radius: 24px;
        padding: 1.3rem;
      }
      .step span {
        display: inline-flex;
        min-width: 2.2rem;
        height: 2.2rem;
        padding: 0 0.7rem;
        border-radius: 999px;
        align-items: center;
        justify-content: center;
        background: rgba(138, 166, 255, 0.18);
        color: var(--accent-strong);
        font-weight: 800;
        margin-bottom: 1rem;
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
      }
      .step p,
      .compact-cards p,
      .use-case p {
        margin-bottom: 0;
      }
      .compact-cards > article,
      .use-case {
        border-radius: 22px;
        padding: 1.25rem;
      }
      .card-note {
        display: inline-block;
        margin-top: 0.8rem;
        color: var(--highlight);
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 0.76rem;
      }
      .use-case-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .cta-panel {
        border-radius: 28px;
        padding: 1.75rem;
        background:
          radial-gradient(circle at top right, rgba(138, 166, 255, 0.24), transparent 16rem),
          linear-gradient(180deg, rgba(11, 15, 28, 0.98), rgba(7, 10, 20, 0.98));
        color: rgba(255, 255, 255, 0.88);
      }
      .cta-panel h2,
      .cta-panel p {
        color: white;
      }
      .cta-panel p {
        max-width: 36rem;
      }
      .footer {
        margin-top: 1.75rem;
        font-size: 0.95rem;
        color: var(--muted);
      }
      code {
        padding: 0.1rem 0.35rem;
        border-radius: 6px;
        background: rgba(138, 166, 255, 0.16);
      }
      @media (max-width: 900px) {
        .hero,
        .steps,
        .two-up,
        .three-up,
        .use-case-grid {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 760px) {
        .card {
          padding: 1.2rem;
          border-radius: 24px;
        }
        h1 {
          max-width: none;
          font-size: clamp(2.6rem, 14vw, 4rem);
        }
        h2 {
          font-size: clamp(1.8rem, 9vw, 2.6rem);
        }
        section + section {
          margin-top: 3rem;
        }
        .hero-actions,
        .hero-points {
          gap: 0.6rem;
        }
        .button {
          width: 100%;
        }
        .section-shell,
        .hero-panel,
        .comparison-card,
        .step,
        .compact-cards > article,
        .use-case,
        .cta-panel {
          padding: 1.1rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        {{ block "main" . }}{{ end }}
      </div>
    </main>
  </body>
</html>
