<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ site.Title }}</title>
    <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #111827;
        --muted: #4b5563;
        --accent: #2563eb;
        --border: #dbe4ee;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
        color: var(--text);
        background: linear-gradient(180deg, #f8fafc 0%, #eef4ff 100%);
      }
      main {
        max-width: 48rem;
        margin: 4rem auto;
        padding: 0 1rem 4rem;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 2rem;
        box-shadow: 0 20px 45px rgba(37, 99, 235, 0.08);
      }
      .eyebrow {
        display: inline-block;
        margin-bottom: 0.75rem;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }
      h1 { line-height: 1.1; margin: 0 0 0.75rem; }
      p { margin: 0 0 1rem; color: var(--muted); }
      a { color: var(--accent); }
      .hero { display: grid; gap: 1rem; }
      .hero-copy { font-size: 1.2rem; max-width: 42rem; color: #334155; }
      .hero-actions { display: flex; flex-wrap: wrap; gap: 0.75rem; margin: 0.5rem 0 0.25rem; }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.8rem 1rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        text-decoration: none;
        color: var(--text);
        background: #fff;
        font-weight: 600;
      }
      .button.primary {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      .hero-points { margin: 0; padding-left: 1.25rem; color: var(--muted); }
      .visual {
        margin: 2rem 0;
        padding: 1rem;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: linear-gradient(180deg, #f8fbff 0%, #f1f5f9 100%);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
      }
      .flow-card {
        padding: 0.8rem 1rem;
        border-radius: 12px;
        background: white;
        border: 1px solid var(--border);
        font-weight: 700;
        color: #1e293b;
      }
      .flow-arrow { color: var(--accent); font-weight: 900; }
      .section { margin-top: 2.5rem; }
      h2 { margin: 0 0 0.75rem; line-height: 1.15; }
      h3 { margin-bottom: 0.35rem; }
      ul { color: var(--muted); }
      .grid { display: grid; gap: 1rem; }
      .two-up { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .three-up { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .steps .step,
      .compact-cards > div {
        border: 1px solid var(--border);
        border-radius: 14px;
        background: #fff;
        padding: 1rem;
      }
      .steps .step span {
        display: inline-flex;
        width: 1.75rem;
        height: 1.75rem;
        border-radius: 999px;
        align-items: center;
        justify-content: center;
        background: #dbeafe;
        color: var(--accent);
        font-weight: 800;
        margin-bottom: 0.75rem;
      }
      .footer {
        margin-top: 2rem;
        font-size: 0.95rem;
        color: var(--muted);
      }
      code {
        padding: 0.1rem 0.35rem;
        border-radius: 6px;
        background: #eff6ff;
      }
      @media (max-width: 760px) {
        main { margin: 2rem auto; }
        .card { padding: 1.25rem; }
        .two-up, .three-up { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        {{ block "main" . }}{{ end }}
      </div>
    </main>
  </body>
</html>
